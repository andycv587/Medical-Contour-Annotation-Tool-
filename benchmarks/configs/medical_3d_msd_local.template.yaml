name: "medical_3d_msd_local_template"
dataset: "medical_3d"
dataset_registry_path: "configs/datasets.local.yaml"
model_registry_path: "configs/model_registry.local.yaml"
output_dir: "results/medical_3d_msd"
max_cases: 3
target_label: "TO_BE_FILLED"
backend_candidates:
  - medsam2
  - medsam
  - classical
prompt_strategy:
  - bbox_from_ground_truth_for_benchmark_only
  - center_point_from_ground_truth_for_benchmark_only
memory_mode: "no_memory"
save_masks: true
save_provenance: true
allow_mock_backend: false
allow_classical_baseline: true
allow_classical_only: true
oracle_prompt_disclosure: "Ground truth is used only to generate standardized prompts for benchmark comparability; this is not autonomous segmentation."
status: "NOT_CONFIGURED"
